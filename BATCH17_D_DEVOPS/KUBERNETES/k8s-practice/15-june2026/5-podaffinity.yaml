  apiVersion: v1
  kind: Pod
  metadata:
    name: frontend-pod
  spec:
    affinity:
      podAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
            - key: app
              operator: In
              values:
              - backend
          topologyKey: "kubernetes.io/hostname"
    containers:
    - name: nginx
      image: nginx